        * {

            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {

            text-decoration: none;

            transition: 0.3s;
        }

            background-color: #374151;
        }

        /* BOTÓN BUZÓN */
        .buzon {
            background-color: #dc2626;
            border-radius: 6px;
        }

        .buzon:hover {
            background-color: #b91c1c;
        }

        /* CONTENIDO PRINCIPAL */

            padding: 40px;
        }

        .bienvenida {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }

        .bienvenida h1 {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .bienvenida p {
            font-size: 18px;
            color: #555;
        }
