<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mi Canal</title>

    <style>
        /* CONFIGURACIÓN GENERAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #111827;
            color: white;
            min-height: 80px;

            display: flex;
            align-items: center;
            justify-content: space-between;

            padding: 10px 40px;
            gap: 20px;
        }

        .logo img {
            height: 60px;
            width: auto;
            display: block;
        }

        /* MENÚ */
        nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 6px;
            transition: 0.3s;
            white-space: nowrap;
        }

        nav a:hover {
            background-color: #374151;
        }

        /* BOTÓN BUZÓN */
        .buzon {
            background-color: #dc2626;
            border-radius: 6px;
        }

        .buzon:hover {
            background-color: #b91c1c;
        }

        /* CONTENIDO PRINCIPAL */
        main {
            padding: 40px;
        }

        .bienvenida {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }

        .bienvenida h1 {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .bienvenida p {
            font-size: 18px;
            color: #555;
        }

        /* =============================== */
        /* TABLETS */
        /* =============================== */

        @media (max-width: 1000px) {

            header {
                flex-direction: column;
                padding: 20px;
            }

            nav {
                width: 100%;
            }

        }


        /* =============================== */
        /* CELULARES */
        /* =============================== */

        @media (max-width: 600px) {

            header {
                padding: 15px 10px;
            }

            .logo img {
                height: 50px;
            }

            nav {
                flex-direction: column;
                width: 100%;
                gap: 5px;
            }

            nav a {
                text-align: center;
                width: 100%;
                padding: 10px;
            }

            main {
                padding: 15px;
            }

            .bienvenida {
                padding: 25px 15px;
            }

            .bienvenida h1 {
                font-size: 26px;
            }

            .bienvenida p {
                font-size: 16px;
            }

        }

        .fecha-hora {
            margin-left: auto;
            text-align: right;
            color: white;
            white-space: nowrap;
        }

        #fecha {
            font-size: 14px;
        }

        #hora {
            font-size: 20px;
            font-weight: bold;
        }

        @media (max-width: 600px) {

            .fecha-hora {
                margin-left: 0;
                text-align: center;
                width: 100%;
            }

        }
    </style>
</head>

<body>

    <header>

        <!-- LOGO DEL CANAL -->
        <div class="logo">
            <img src="Logo.png" alt="Logo del canal">
        </div>

        <!-- MENÚ -->
        <nav>
            <a href="index.html">Inicio</a>

            <a href="CÓDIGO DE ÉTICA DEL CANAL GUANOVISIÓN.pdf" target="_blank">
                📜 Código de Ética
            </a>

            <a href="noticias.html">📰 Noticias</a>
            <a href="deportes.html">⚽ Deportes</a>
            <a href="entretenimiento.html">🎵 Entretenimiento</a>
            <a href="buzon.html" class="buzon">📬 Buzón</a>
        </nav>

        <!-- FECHA Y HORA -->
        <div class="fecha-hora">
            <div id="fecha"></div>
            <div id="hora"></div>
        </div>

    </header>



    <!-- CONTENIDO PRINCIPAL -->
    <main>

        <section class="bienvenida">

            <h1>Bienvenidos a MI CANAL</h1>

            <p>
                Noticias, deportes, entretenimiento y mucho más.
            </p>

        </section>

    </main>
    <script>

        function actualizarFechaHora() {

            const ahora = new Date();

            const dias = [
                "Domingo",
                "Lunes",
                "Martes",
                "Miércoles",
                "Jueves",
                "Viernes",
                "Sábado"
            ];

            const meses = [
                "Enero",
                "Febrero",
                "Marzo",
                "Abril",
                "Mayo",
                "Junio",
                "Julio",
                "Agosto",
                "Septiembre",
                "Octubre",
                "Noviembre",
                "Diciembre"
            ];

            const diaSemana = dias[ahora.getDay()];
            const dia = ahora.getDate();
            const mes = meses[ahora.getMonth()];
            const año = ahora.getFullYear();

            const horas = String(ahora.getHours()).padStart(2, "0");
            const minutos = String(ahora.getMinutes()).padStart(2, "0");
            const segundos = String(ahora.getSeconds()).padStart(2, "0");

            document.getElementById("fecha").textContent =
                `${diaSemana} ${dia} de ${mes} ${año}`;

            document.getElementById("hora").textContent =
                `${horas}:${minutos}:${segundos}`;

        }

        actualizarFechaHora();

        setInterval(actualizarFechaHora, 1000);

    </script>


</body>

</html>
