<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Canal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    /* BARRA SUPERIOR COMPACTA (COMO AL PRINCIPIO) */
    header {
      background-color: #111827;
      color: white;
      height: 70px; /* Tamaño normal, sin espacio vacío */
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      position: relative;
    }

    /* LOGO DENTRO DE LA BARRA (ARRIBA IZQUIERDA) */
    .logo-arriba {
      height: 50px;
      width: auto;
    }

    /* MENÚ CENTRADO, SIN ESPACIOS VACÍOS */
    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 0 auto;
    }

    nav a {
      color: white;
      text-decoration: none;
      padding: 10px 15px;
      border-radius: 5px;
      transition: 0.2s;
      white-space: nowrap;
    }

    nav a:hover {
      background-color: #374151;
    }

    .buzon {
      background-color: #dc2626;
      border-radius: 5px;
    }

    .buzon:hover {
      background-color: #b91c1c;
    }

    /* FECHA Y HORA ARRIBA DERECHA */
    .fecha-hora {
      color: white;
      text-align: right;
      white-space: nowrap;
    }

    #fecha { font-size: 13px; }
    #hora { font-size: 18px; font-weight: bold; }

    /* =============================================
       CAJÓN DE REDES: MÁS ABAJO, BIEN A LA IZQUIERDA
       ============================================= */
    .cajon-redes {
      position: absolute;
      top: 90px; /* 🔽 MÁS ABAJO DE LA BARRA */
      left: 15px; /* 🔙 MÁS PEGADO A LA IZQUIERDA */
      background-color: #1e293b;
      padding: 12px 10px;
      border-radius: 6px;
      display: flex;
      flex-direction: column; /* VERTICAL */
      gap: 15px;
      border: 1px solid #334155;
    }

    .cajon-redes img {
      width: 26px;
      height: 26px;
      object-fit: contain;
      transition: 0.2s;
    }

    .cajon-redes img:hover {
      transform: scale(1.15);
    }

    /* CONTENIDO PRINCIPAL */
    main {
      padding: 60px 20px 40px 20px; /* Espacio para no chocar con el cajón */
    }

    .bienvenida {
      background: white;
      padding: 40px;
      border-radius: 8px;
      text-align: center;
    }

    .bienvenida h1 { font-size: 34px; margin-bottom: 12px; }
    .bienvenida p { font-size: 17px; color: #555; }

    /* RESPONSIVO */
    @media (max-width: 900px) {
      header { height: auto; padding: 10px; flex-wrap: wrap; }
      .logo-arriba { margin: 0 auto 10px auto; }
      nav { width: 100%; order: 3; margin: 10px 0; }
      .fecha-hora { width: 100%; text-align: center; order: 2; }
      .cajon-redes {
        position: static;
        margin: 20px auto;
        flex-direction: row;
      }
      main { padding-top: 20px; }
    }
  </style>
</head>

<body>
  <header>
    <!-- LOGO ARRIBA IZQUIERDA (DENTRO DE LA BARRA) -->
    <img src="Logo.png" alt="Guano Visión TV" class="logo-arriba">

    <!-- MENÚ ARRIBA CENTRO (SIN ESPACIOS VACÍOS) -->
    <nav>
      <a href="index.html">Inicio</a>
      <a href="CÓDIGO DE ÉTICA DEL CANAL GUANOVISIÓN.pdf" target="_blank">📜 Código de Ética</a>
      <a href="noticias.html">📰 Noticias</a>
      <a href="deportes.html">⚽ Deportes</a>
      <a href="entretenimiento.html">🎵 Entretenimiento</a>
      <a href="buzon.html" class="buzon">📬 Buzón</a>
    </nav>

    <!-- FECHA Y HORA ARRIBA DERECHA -->
    <div class="fecha-hora">
      <div id="fecha"></div>
      <div id="hora"></div>
    </div>

    <!-- ✅ CAJÓN DE REDES: MÁS ABAJO Y A LA IZQUIERDA -->
    <div class="cajon-redes">
      <a href="https://www.facebook.com/share/18atR5m3qx/" target="_blank">
        <img src="facebook.png" alt="Facebook" />
      </a>
      <a href="https://www.instagram.com/guanovison_ec?igsh=NjV0c2ZiZDFiZXo0" target="_blank">
        <img src="instagram.png" alt="Instagram" />
      </a>
      <a href="https://youtube.com/@guanovisiontv?si=TPn5InwYzlW5fV7l" target="_blank">
        <img src="youtube.png" alt="YouTube" />
      </a>
      <a href="https://www.tiktok.com/@guano_vision?_r=1&_t=ZS-98HDQtvIZUO" target="_blank">
        <img src="tiktok.png" alt="TikTok" />
      </a>
    </div>
  </header>

  <main>
    <section class="bienvenida">
      <h1>Bienvenidos a MI CANAL</h1>
      <p>Noticias, deportes, entretenimiento y mucho más.</p>
    </section>
  </main>

  <script>
    function actualizarFechaHora() {
      const ahora = new Date();
      const dias = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
      const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
      document.getElementById("fecha").textContent = `${dias[ahora.getDay()]} ${ahora.getDate()} de ${meses[ahora.getMonth()]} ${ahora.getFullYear()}`;
      document.getElementById("hora").textContent = `${String(ahora.getHours()).padStart(2,"0")}:${String(ahora.getMinutes()).padStart(2,"0")}`;
    }
    actualizarFechaHora();
    setInterval(actualizarFechaHora, 1000);
  </script>
</body>
</html>
